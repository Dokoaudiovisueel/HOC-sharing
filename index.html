<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Home of Champions – Directory</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0a; --surface: #141414; --surface2: #1c1c1c;
      --gold: #c9a84c; --gold-light: #f0d080; --gold-dark: #9a7430;
      --gold-gradient: linear-gradient(135deg, #9a7430 0%, #f0d080 45%, #c9a84c 60%, #9a7430 100%);
      --gold-gradient-btn: linear-gradient(135deg, #b8932e, #f0d080, #b8932e);
      --text: #f0d080; --text-body: #d4b870; --muted: #7a6535;
      --border: #2a2318; --border-gold: #4a3820; --radius: 10px;
    }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text-body); min-height: 100vh; }
    header {
      background: linear-gradient(180deg, #0f0d08 0%, #1a1508 100%);
      border-bottom: 1px solid var(--border-gold);
      padding: 28px 40px 24px;
      display: flex; align-items: center; justify-content: space-between;
      gap: 20px; flex-wrap: wrap; position: relative; overflow: hidden;
    }
    header::before {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(ellipse at 50% -20%, rgba(201,168,76,0.12) 0%, transparent 70%);
      pointer-events: none;
    }
    .logo-area { display: flex; align-items: center; gap: 18px; }
    .logo-badge {
      width: 72px; height: 72px; border-radius: 50%;
      background: linear-gradient(145deg, #1a1508, #2a1f08);
      border: 2px solid var(--gold); display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; box-shadow: 0 0 20px rgba(201,168,76,0.3); overflow: hidden;
    }
    .logo-badge img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
    .logo-text h1 {
      font-family: 'Cinzel', serif; font-size: 1.5rem; font-weight: 900;
      background: var(--gold-gradient); -webkit-background-clip: text;
      -webkit-text-fill-color: transparent; background-clip: text;
      letter-spacing: 2px; line-height: 1.1; text-transform: uppercase;
    }
    .logo-text p { font-size: 0.72rem; color: var(--muted); letter-spacing: 3px; text-transform: uppercase; margin-top: 4px; }
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 10px 22px; border-radius: 7px; font-size: 0.82rem; font-weight: 700;
      cursor: pointer; border: none; transition: all 0.2s;
      letter-spacing: 0.5px; text-transform: uppercase; font-family: 'Inter', sans-serif;
    }
    .btn-primary { background: var(--gold-gradient-btn); color: #0a0a0a; box-shadow: 0 2px 12px rgba(201,168,76,0.3); }
    .btn-primary:hover { box-shadow: 0 4px 20px rgba(201,168,76,0.5); transform: translateY(-1px); }
    .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border-gold); }
    .btn-ghost:hover { border-color: var(--gold); color: var(--gold); }
    .btn-danger { background: transparent; color: #c0392b; border: 1px solid #4a1a1a; }
    .btn-danger:hover { background: #2a0a0a; border-color: #c0392b; }
    .btn-sm { padding: 6px 12px; font-size: 0.75rem; }
    main { max-width: 1140px; margin: 0 auto; padding: 36px 24px; }
    .search-bar { display: flex; gap: 10px; margin-bottom: 28px; }
    .search-bar input {
      flex: 1; padding: 12px 18px; border: 1px solid var(--border-gold);
      border-radius: 8px; font-size: 0.9rem; background: var(--surface);
      color: var(--text-body); outline: none; transition: border-color 0.15s, box-shadow 0.15s;
      font-family: 'Inter', sans-serif;
    }
    .search-bar input::placeholder { color: var(--muted); }
    .search-bar input:focus { border-color: var(--gold); box-shadow: 0 0 0 3px rgba(201,168,76,0.1); }
    .count { font-size: 0.78rem; color: var(--muted); margin-bottom: 18px; letter-spacing: 1px; text-transform: uppercase; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(310px, 1fr)); gap: 20px; }
    .card {
      background: var(--surface); border: 1px solid var(--border-gold);
      border-radius: var(--radius); padding: 24px; display: flex; flex-direction: column;
      gap: 12px; transition: border-color 0.2s, box-shadow 0.2s, transform 0.15s;
      position: relative; overflow: hidden;
    }
    .card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: var(--gold-gradient); opacity: 0; transition: opacity 0.2s;
    }
    .card:hover { border-color: var(--gold-dark); box-shadow: 0 6px 24px rgba(0,0,0,0.4); transform: translateY(-2px); }
    .card:hover::before { opacity: 1; }
    .card-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
    .card-company {
      font-size: 1.05rem; font-weight: 700; background: var(--gold-gradient);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text; font-family: 'Cinzel', serif;
    }
    .card-role {
      font-size: 0.72rem; color: #0a0a0a; font-weight: 700;
      background: var(--gold-gradient-btn); padding: 2px 9px; border-radius: 20px;
      white-space: nowrap; text-transform: uppercase; letter-spacing: 0.5px; flex-shrink: 0;
    }
    .card-name { font-size: 0.875rem; font-weight: 600; color: var(--text); }
    .card-desc { font-size: 0.82rem; color: var(--muted); line-height: 1.6; }
    .card-info { display: flex; flex-direction: column; gap: 6px; font-size: 0.82rem; }
    .card-info a { color: var(--gold); text-decoration: none; }
    .card-info a:hover { color: var(--gold-light); text-decoration: underline; }
    .info-row { display: flex; align-items: center; gap: 8px; color: var(--text-body); }
    .info-row .icon { width: 16px; text-align: center; color: var(--gold-dark); flex-shrink: 0; font-size: 0.8rem; }
    .card-divider { border: none; border-top: 1px solid var(--border); margin: 0; }
    .card-actions { display: flex; gap: 8px; }
    .empty { text-align: center; padding: 70px 20px; color: var(--muted); grid-column: 1 / -1; }
    .empty p { font-size: 0.875rem; margin-top: 12px; }
    .overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.75); z-index: 100;
      align-items: center; justify-content: center;
      padding: 20px; backdrop-filter: blur(3px);
    }
    .overlay.open { display: flex; }
    .modal {
      background: var(--surface); border: 1px solid var(--border-gold);
      border-radius: var(--radius); width: 100%; max-width: 560px;
      max-height: 90vh; overflow-y: auto; padding: 30px; position: relative;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    }
    .modal-header {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 22px; padding-bottom: 16px; border-bottom: 1px solid var(--border-gold);
    }
    .modal-header h2 {
      font-family: 'Cinzel', serif; font-size: 1.05rem; font-weight: 700;
      background: var(--gold-gradient); -webkit-background-clip: text;
      -webkit-text-fill-color: transparent; background-clip: text;
      letter-spacing: 1px; text-transform: uppercase;
    }
    .modal-close { position: absolute; top: 14px; right: 16px; background: none; border: none; font-size: 1.2rem; cursor: pointer; color: var(--muted); }
    .modal-close:hover { color: var(--gold); }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .form-grid .full { grid-column: 1 / -1; }
    .field { display: flex; flex-direction: column; gap: 5px; }
    .field label { font-size: 0.75rem; font-weight: 600; color: var(--gold-dark); text-transform: uppercase; letter-spacing: 0.5px; }
    .field input, .field textarea {
      padding: 9px 12px; border: 1px solid var(--border-gold); border-radius: 7px;
      font-size: 0.875rem; font-family: 'Inter', sans-serif; outline: none;
      transition: border-color 0.15s, box-shadow 0.15s; background: var(--surface2); color: var(--text-body);
    }
    .field input::placeholder, .field textarea::placeholder { color: #3a3020; }
    .field input:focus, .field textarea:focus { border-color: var(--gold); box-shadow: 0 0 0 3px rgba(201,168,76,0.1); }
    .field textarea { resize: vertical; min-height: 80px; }
    .field .hint { font-size: 0.72rem; color: var(--muted); }
    .form-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 22px; padding-top: 16px; border-top: 1px solid var(--border); }
    .pin-modal-inner { max-width: 380px; }
    .pin-desc { font-size: 0.85rem; color: var(--muted); margin-bottom: 18px; text-align: center; }
    .toast {
      position: fixed; bottom: 24px; right: 24px;
      background: var(--surface); border: 1px solid var(--gold-dark);
      color: var(--gold-light); padding: 12px 20px; border-radius: 8px;
      font-size: 0.82rem; font-weight: 600; z-index: 200;
      opacity: 0; transition: opacity 0.2s; pointer-events: none;
    }
    .toast.show { opacity: 1; }
  </style>
</head>

      </div>
      <div class="form-actions">
        <button type="button" class="btn btn-ghost" onclick="closeModal('formOverlay')">Annuleren</button>
        <button type="submit" class="btn btn-primary" id="formSubmitBtn">Toevoegen</button>
      </div>
    </form>
  </div>
</div>

<!-- PIN verify modal -->
<div class="overlay" id="pinOverlay">
  <div class="modal pin-modal-inner">
    <button class="modal-close" onclick="closeModal('pinOverlay')">✕</button>
    <div class="modal-header" style="justify-content:center;"><h2 id="pinTitle">Pincode vereist</h2></div>
    <p class="pin-desc" id="pinDesc"></p>
    <div class="field" style="margin-bottom:18px;">
      <input id="pinInput" type="password" maxlength="4" pattern="\d{4}" placeholder="••••"
        style="text-align:center;font-size:1.6rem;letter-spacing:10px;" />
    </div>
    <div style="display:flex;gap:10px;justify-content:center;">
      <button class="btn btn-ghost" onclick="closeModal('pinOverlay')">Annuleren</button>
      <button class="btn btn-primary" onclick="verifyPin()">Bevestigen</button>
    </div>
    <p id="pinError" style="color:#c0392b;font-size:0.78rem;margin-top:12px;text-align:center;display:none;">Onjuiste pincode.</p>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const STORAGE_KEY = 'hoc_directory_v1';
  let entries = [];
  let editId = null;
  let pendingAction = null;

  function load() { try { entries = JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; } catch { entries = []; } }
  function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(entries)); }
  function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }

  function renderCards() {
    const q = document.getElementById('searchInput').value.toLowerCase().trim();
    const filtered = q ? entries.filter(e =>
      [e.company,e.role,e.name,e.desc,e.email,e.website,e.social].join(' ').toLowerCase().includes(q)
    ) : entries;

    document.getElementById('countLabel').textContent =
      `${filtered.length} vermelding${filtered.length !== 1 ? 'en' : ''} gevonden`;

    const grid = document.getElementById('grid');
    if (filtered.length === 0) {
      grid.innerHTML = `<div class="empty">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#4a3820" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
        <p>${q ? 'Geen resultaten voor "' + esc(q) + '"' : 'Nog geen vermeldingen. Voeg de eerste toe!'}</p>
      </div>`;
      return;
    }

    grid.innerHTML = filtered.map(e => `
      <div class="card">
        <div class="card-header">
          <div class="card-company">${esc(e.company)}</div>
          ${e.role ? `<span class="card-role">${esc(e.role)}</span>` : ''}
        </div>
        ${e.name ? `<div class="card-name">${esc(e.name)}</div>` : ''}
        ${e.desc ? `<div class="card-desc">${esc(e.desc)}</div>` : ''}
        <div class="card-info">
          ${e.email ? `<div class="info-row"><span class="icon">✉</span><a href="mailto:${esc(e.email)}">${esc(e.email)}</a></div>` : ''}
          ${e.phone ? `<div class="info-row"><span class="icon">📞</span><span>${esc(e.phone)}</span></div>` : ''}
          ${e.website ? `<div class="info-row"><span class="icon">🌐</span><a href="${esc(e.website)}" target="_blank" rel="noopener">${esc(e.website)}</a></div>` : ''}
          ${e.social ? `<div class="info-row"><span class="icon">🔗</span>${linkify(e.social)}</div>` : ''}
        </div>
        <hr class="card-divider" />
        <div class="card-actions">
          <button class="btn btn-ghost btn-sm" onclick="requestEdit('${e.id}')">✏️ Bewerken</button>
          <button class="btn btn-danger btn-sm" onclick="requestDelete('${e.id}')">🗑 Verwijderen</button>
        </div>
      </div>
    `).join('');
  }

  function esc(s) {
    if (!s) return '';
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function linkify(s) {
    if (!s) return esc(s);
    if (s.startsWith('http')) return `<a href="${esc(s)}" target="_blank" rel="noopener">${esc(s)}</a>`;
    return esc(s);
  }

  function openAdd() {
    editId = null;
    document.getElementById('formTitle').textContent = 'Vermelding toevoegen';
    document.getElementById('formSubmitBtn').textContent = 'Toevoegen';
    document.getElementById('pinField').style.display = '';
    document.getElementById('f-pin').required = true;
    document.getElementById('entryForm').reset();
    document.getElementById('formOverlay').classList.add('open');
  }

  function openEdit(id) {
    const e = entries.find(x => x.id === id);
    if (!e) return;
    editId = id;
    document.getElementById('formTitle').textContent = 'Vermelding bewerken';
    document.getElementById('formSubmitBtn').textContent = 'Opslaan';
    document.getElementById('pinField').style.display = 'none';
    document.getElementById('f-pin').required = false;
    document.getElementById('f-company').value = e.company || '';
    document.getElementById('f-role').value = e.role || '';
    document.getElementById('f-name').value = e.name || '';
    document.getElementById('f-email').value = e.email || '';
    document.getElementById('f-phone').value = e.phone || '';
    document.getElementById('f-website').value = e.website || '';
    document.getElementById('f-social').value = e.social || '';
    document.getElementById('f-desc').value = e.desc || '';
    document.getElementById('formOverlay').classList.add('open');
  }

  function saveEntry(ev) {
    ev.preventDefault();
    if (editId) {
      const idx = entries.findIndex(x => x.id === editId);
      if (idx === -1) return;
      entries[idx] = { ...entries[idx],
        company: document.getElementById('f-company').value.trim(),
        role:    document.getElementById('f-role').value.trim(),
        name:    document.getElementById('f-name').value.trim(),
        email:   document.getElementById('f-email').value.trim(),
        phone:   document.getElementById('f-phone').value.trim(),
        website: document.getElementById('f-website').value.trim(),
        social:  document.getElementById('f-social').value.trim(),
        desc:    document.getElementById('f-desc').value.trim(),
      };
      showToast('✓ Vermelding bijgewerkt');
    } else {
      const pin = document.getElementById('f-pin').value;
      if (!/^\d{4}$/.test(pin)) { alert('Voer een pincode in van precies 4 cijfers.'); return; }
      entries.unshift({ id: uid(),
        company: document.getElementById('f-company').value.trim(),
        role:    document.getElementById('f-role').value.trim(),
        name:    document.getElementById('f-name').value.trim(),
        email:   document.getElementById('f-email').value.trim(),
        phone:   document.getElementById('f-phone').value.trim(),
        website: document.getElementById('f-website').value.trim(),
        social:  document.getElementById('f-social').value.trim(),
        desc:    document.getElementById('f-desc').value.trim(),
        pin,
      });
      showToast('✓ Vermelding toegevoegd');
    }
    save(); closeModal('formOverlay'); renderCards();
  }

  function requestEdit(id) {
    pendingAction = { action: 'edit', id };
    document.getElementById('pinTitle').textContent = 'Pincode vereist';
    document.getElementById('pinDesc').textContent = 'Voer je pincode in om deze vermelding te bewerken.';
    document.getElementById('pinInput').value = '';
    document.getElementById('pinError').style.display = 'none';
    document.getElementById('pinOverlay').classList.add('open');
    setTimeout(() => document.getElementById('pinInput').focus(), 100);
  }

  function requestDelete(id) {
    pendingAction = { action: 'delete', id };
    document.getElementById('pinTitle').textContent = 'Verwijderen bevestigen';
    document.getElementById('pinDesc').textContent = 'Voer je pincode in om deze vermelding definitief te verwijderen.';
    document.getElementById('pinInput').value = '';
    document.getElementById('pinError').style.display = 'none';
    document.getElementById('pinOverlay').classList.add('open');
    setTimeout(() => document.getElementById('pinInput').focus(), 100);
  }

  function verifyPin() {
    if (!pendingAction) return;
    const entered = document.getElementById('pinInput').value;
    const entry = entries.find(x => x.id === pendingAction.id);
    if (!entry || entry.pin !== entered) {
      document.getElementById('pinError').style.display = 'block';
      return;
    }
    closeModal('pinOverlay');
    if (pendingAction.action === 'edit') {
      openEdit(pendingAction.id);
    } else {
      entries = entries.filter(x => x.id !== pendingAction.id);
      save(); renderCards();
      showToast('Vermelding verwijderd');
    }
    pendingAction = null;
  }

  document.getElementById('pinInput').addEventListener('keydown', e => { if (e.key === 'Enter') verifyPin(); });

  function closeModal(id) { document.getElementById(id).classList.remove('open'); }
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  document.querySelectorAll('.overlay').forEach(o => {
    o.addEventListener('click', e => { if (e.target === o) closeModal(o.id); });
  });

  load();
  renderCards();
</script>
</body>
</html>
